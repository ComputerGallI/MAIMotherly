<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stress & Anxiety Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="logo" onclick="window.location.href='index.html'">MAI</div>
  <div class="box-section">
    <h2>Stress & Anxiety Quiz</h2>
    <form id="quizForm">
      <p>1. I feel overwhelmed by my responsibilities.</p>
      <button type="button" class="quiz-btn">Always</button>
      <button type="button" class="quiz-btn">Often</button>
      <button type="button" class="quiz-btn">Sometimes</button>
      <button type="button" class="quiz-btn">Rarely</button>
      <button type="button" class="quiz-btn">Never</button>

      <p>2. I have trouble relaxing.</p>
      <button type="button" class="quiz-btn">Always</button>
      <button type="button" class="quiz-btn">Often</button>
      <button type="button" class="quiz-btn">Sometimes</button>
      <button type="button" class="quiz-btn">Rarely</button>
      <button type="button" class="quiz-btn">Never</button>

      <p>3. I worry about things I cannot control.</p>
      <button type="button" class="quiz-btn">Always</button>
      <button type="button" class="quiz-btn">Often</button>
      <button type="button" class="quiz-btn">Sometimes</button>
      <button type="button" class="quiz-btn">Rarely</button>
      <button type="button" class="quiz-btn">Never</button>
    </form>
  </div>
</body>
</html>
