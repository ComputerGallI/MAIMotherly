<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Language Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="logo" onclick="window.location.href='index.html'">MAI</div>
  <div class="box-section">
    <h2>Love Language Quiz</h2>
    <form id="quizForm">
      <p>1. I feel most loved when someone gives me gifts.</p>
      <button type="button" class="quiz-btn">Strongly Agree</button>
      <button type="button" class="quiz-btn">Agree</button>
      <button type="button" class="quiz-btn">Neutral</button>
      <button type="button" class="quiz-btn">Disagree</button>
      <button type="button" class="quiz-btn">Strongly Disagree</button>

      <p>2. Physical touch makes me feel valued.</p>
      <button type="button" class="quiz-btn">Strongly Agree</button>
      <button type="button" class="quiz-btn">Agree</button>
      <button type="button" class="quiz-btn">Neutral</button>
      <button type="button" class="quiz-btn">Disagree</button>
      <button type="button" class="quiz-btn">Strongly Disagree</button>

      <p>3. I like hearing words of affirmation.</p>
      <button type="button" class="quiz-btn">Strongly Agree</button>
      <button type="button" class="quiz-btn">Agree</button>
      <button type="button" class="quiz-btn">Neutral</button>
      <button type="button" class="quiz-btn">Disagree</button>
      <button type="button" class="quiz-btn">Strongly Disagree</button>
    </form>
  </div>
</body>
</html>
