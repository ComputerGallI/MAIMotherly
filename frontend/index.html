<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAI - Motherly AI</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="scripts/chart.js"></script>
  <script defer src="scripts/chat.js"></script>
  <script defer src="scripts/quiz.js"></script>
</head>
<body>
  <div id="logo" onclick="window.location.href='index.html'">MAI</div>

  <div class="container">

    <!-- QUIZ RESULTS BOX -->
    <div class="box-section quiz-results-box">
      <h2>Quiz Results</h2>
      <div class="circle-container">
        <div class="center-circle" onclick="window.location.href='login.html'">
          Register or Log in
        </div>
        <!-- Floating Quiz Buttons -->
        <button class="float-btn" onclick="window.location.href='quizzes/quiz_personality.html'">Personality</button>
        <button class="float-btn" onclick="window.location.href='quizzes/quiz_stress.html'">Stress & Anxiety</button>
        <button class="float-btn" onclick="window.location.href='quizzes/quiz_love.html'">Love Language</button>
        <button class="float-btn" onclick="window.location.href='quizzes/quiz_21.html'">21 Questions</button>
      </div>
    </div>

    <!-- REMINDERS BOX -->
    <div class="box-section reminders-box">
      <h2>Reminders</h2>
      <p id="reminders">No reminders yet</p>
      <button class="quiz-btn" onclick="addToCalendar()">Add to Calendar</button>
    </div>

  </div>

  <!-- CHATBOT BOX -->
  <div class="box-section chatbot-box">
    <h2 class="chat-title">Talk to MAI</h2>
    <div id="chat-window"></div>
    <div class="chat-input-container">
      <input type="text" id="chat-input" placeholder="Type your message here..." />
      <button class="quiz-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</body>
</html>
