<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAI - Motherly AI</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="scripts/chart.js"></script>
  <script defer src="scripts/chat.js"></script>
</head>
<body>

  <!-- Top Navigation -->
  <header class="top-bar">
    <div class="logo" onclick="goHome()">MAI</div>
    <div class="nav-buttons">
      <button class="top-btn" onclick="login()">Login</button>
      <button class="top-btn" onclick="profile()">Profile</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Quiz Results Left Box -->
    <div class="box-section quiz-container">
      <h2>Quiz Results</h2>
      <div class="circle-container">
        <div class="circle" id="mainCircle">Register or Log in</div>
        <button class="orbit-btn orbit1">Personality</button>
        <button class="orbit-btn orbit2">Stress & Anxiety</button>
        <button class="orbit-btn orbit3">Love Language</button>
        <button class="orbit-btn orbit4">21 Questions</button>
      </div>
    </div>

    <!-- Reminders Right Box -->
    <div class="box-section reminders-container">
      <h2>Reminders</h2>
      <p id="reminder-text">No reminders yet</p>
      <button class="main-btn" onclick="addToCalendar()">Add to Calendar</button>
    </div>

  </main>

  <!-- Chatbot Bottom Section -->
  <section class="chat-section">
    <h2>Talk to MAI</h2>
    <div class="chat-input-container">
      <input type="text" id="chat-input" placeholder="Type a message..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div id="chat-output"></div>
  </section>

  <script>
    function goHome(){ window.location.href = 'index.html'; }
    function login(){ alert('Login/Register modal placeholder'); }
    function profile(){ alert('Profile page placeholder'); }
    function addToCalendar(){ alert('Google Calendar API integration placeholder'); }
    function sendMessage(){
      const input = document.getElementById('chat-input');
      const output = document.getElementById('chat-output');
      if(input.value.trim()!==''){
        const msg = document.createElement('p');
        msg.textContent = "You: " + input.value;
        output.appendChild(msg);
        input.value = '';
      }
    }
  </script>
</body>
</html>
