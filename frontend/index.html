<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- top bar -->
  <header>
    <h1 class="logo">MAI</h1>
    <div class="auth-buttons">
      <button id="loginBtn">Login</button>
      <button id="profileBtn">Profile</button>
    </div>
  </header>

  <!-- main layout -->
  <main>
    <!-- left side quiz results -->
    <div class="left-box">
      <h2>Quiz Results</h2>
      <div class="circle-container">
        <button class="orbit-btn orbit-top" id="personalityBtn">Personality</button>
        <button class="orbit-btn orbit-left" id="stressBtn">Stress & Anxiety</button>
        <div class="circle">Register or Log in</div>
        <button class="orbit-btn orbit-right" id="loveBtn">Love Language</button>
        <button class="orbit-btn orbit-bottom" id="questionsBtn">21 Questions</button>
      </div>
    </div>

    <!-- right side reminders -->
    <div class="right-box">
      <h2>Reminders</h2>
      <p id="remindersText">No reminders yet</p>
      <button class="add-calendar">Add to Calendar</button>
    </div>
  </main>

  <!-- chat box bottom -->
  <section class="chat-box">
    <h2>Talk to MAI</h2>
    <div class="chat-container">
      <input type="text" id="chatInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>
  </section>

  <script>
    // load localStorage quiz results
    window.addEventListener("load", () => {
      const personality = localStorage.getItem("quiz_personality");
      const stress = localStorage.getItem("quiz_stress");
      const love = localStorage.getItem("quiz_love");
      const questions = localStorage.getItem("quiz_21q");

      if(personality) document.getElementById("personalityBtn").textContent = personality;
      if(stress) document.getElementById("stressBtn").textContent = stress;
      if(love) document.getElementById("loveBtn").textContent = love;
      if(questions) document.getElementById("questionsBtn").textContent = questions;
    });
  </script>
</body>
</html>
